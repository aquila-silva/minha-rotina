<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Rotina com IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
        }
        
        .data {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .api-config {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ffc107;
        }
        
        .api-config summary {
            cursor: pointer;
            font-weight: bold;
            color: #856404;
        }
        
        .api-config input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .api-config button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .ia-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .ia-section h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .ia-input {
            display: flex;
            gap: 8px;
        }
        
        .ia-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .btn-ia {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-ia:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        input[type="text"] {
            flex: 1;
            min-width: 150px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        
        .btn-adicionar {
            background: #4A90E2;
        }
        
        .atividade {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 5px solid #4A90E2;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .atividade.concluida {
            opacity: 0.5;
            text-decoration: line-through;
            border-left-color: #27AE60;
        }
        
        .info {
            flex: 1;
        }
        
        .nome {
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .detalhes {
            font-size: 13px;
            color: #666;
        }
        
        .acoes button {
            padding: 8px 12px;
            margin-left: 5px;
            font-size: 16px;
        }
        
        .btn-concluir { background: #27AE60; }
        .btn-remover { background: #E74C3C; }
        
        .vazio {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .footer {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn-limpar { background: #E74C3C; }
        .btn-exportar { background: #F39C12; }
        
        .erro {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        
        .erro.mostrar {
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 10px;
            color: #667eea;
            display: none;
        }
        
        .loading.mostrar {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Minha Rotina com IA</h1>
        <p class="data" id="dataAtual"></p>
        
        <!-- Configuração API -->
        <details class="api-config">
            <summary>⚙️ Configurar API Gemini (obrigatório para IA)</summary>
            <p style="font-size: 13px; margin: 10px 0;">
                1. Acesse: <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a><br>
                2. Clique em "Get API Key" ou "Create API Key"<br>
                3. Copie a chave e cole abaixo:
            </p>
            <input type="password" id="apiKeyInput" placeholder="Cole sua API Key aqui (AIzaSy...)">
            <div style="margin-top: 10px;">
                <button onclick="salvarAPIKey()" style="background: #28a745;">💾 Salvar Chave</button>
                <button onclick="testarAPI()" style="background: #17a2b8;">🔍 Testar Conexão</button>
            </div>
            <p id="statusAPI" style="font-size: 13px; margin-top: 10px;"></p>
        </details>
        
        <!-- Seção IA -->
        <div class="ia-section">
            <h3>🤖 Assistente IA</h3>
            <div class="ia-input">
                <input type="text" id="promptIA" placeholder="Ex: rotina de sábado produtivo">
                <button class="btn-ia" onclick="gerarRotina()" id="btnGerar">
                    ✨ Gerar
                </button>
            </div>
            <div class="loading" id="loading">⏳ IA pensando...</div>
            <div class="erro" id="erroMsg"></div>
            <small style="color: #888; display: block; margin-top: 5px;">
                Exemplos: "dia de estudos", "domingo relaxante", "rotina fitness"
            </small>
        </div>
        
        <!-- Formulário Manual -->
        <div class="form-group">
            <input type="text" id="nome" placeholder="O que vai fazer?">
            <input type="time" id="hora">
            <input type="number" id="duracao" placeholder="Min" min="1" value="30" style="width: 70px;">
            <button class="btn-adicionar" onclick="adicionar()">➕</button>
        </div>
        
        <!-- Lista -->
        <div id="lista"></div>
        
        <!-- Rodapé -->
        <div class="footer">
            <button class="btn-limpar" onclick="limparTudo()">🗑️ Limpar</button>
            <button class="btn-exportar" onclick="exportarDados()">📥 Exportar</button>
        </div>
    </div>

    <script>
        // ============ INICIALIZAÇÃO ============
        let API_KEY = localStorage.getItem('gemini_api_key') || '';
        let atividades = JSON.parse(localStorage.getItem('rotina') || '[]');
        
        // Mostrar data
        document.getElementById('dataAtual').textContent = new Date().toLocaleDateString('pt-BR', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
        
        // Carregar chave se existir
        if (API_KEY) {
            document.getElementById('apiKeyInput').value = API_KEY;
            document.getElementById('statusAPI').textContent = '✅ Chave configurada';
            document.getElementById('statusAPI').style.color = 'green';
        }
        
        // ============ FUNÇÕES API ============
        
        function salvarAPIKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key) {
                alert('Cole sua chave API primeiro!');
                return;
            }
            
            if (!key.startsWith('AIza')) {
                alert('❌ Chave inválida! Deve começar com "AIza"');
                return;
            }
            
            API_KEY = key;
            localStorage.setItem('gemini_api_key', key);
            document.getElementById('statusAPI').textContent = '✅ Chave salva!';
            document.getElementById('statusAPI').style.color = 'green';
            alert('✅ Chave salva com sucesso!');
        }
        
        async function testarAPI() {
            const key = document.getElementById('apiKeyInput').value || API_KEY;
            
            if (!key) {
                alert('Configure a chave primeiro!');
                return;
            }
            
            const statusEl = document.getElementById('statusAPI');
            statusEl.textContent = '🔍 Testando...';
            statusEl.style.color = 'blue';
            
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: "Responda apenas: FUNCIONANDO" }]
                            }]
                        })
                    }
                );
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `Erro HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.candidates && data.candidates[0]) {
                    statusEl.textContent = '✅ API funcionando perfeitamente!';
                    statusEl.style.color = 'green';
                    alert('✅ Teste bem-sucedido! A API está funcionando.');
                } else {
                    throw new Error('Resposta inesperada da API');
                }
            } catch (erro) {
                statusEl.textContent = `❌ Erro: ${erro.message}`;
                statusEl.style.color = 'red';
                console.error('Erro no teste:', erro);
                
                // Sugestões de solução
                let sugestao = '\n\nPossíveis soluções:\n';
                sugestao += '1. Verifique se a chave foi copiada corretamente\n';
                sugestao += '2. Acesse https://aistudio.google.com/app/apikey\n';
                sugestao += '3. Crie uma nova chave se necessário\n';
                sugestao += '4. Verifique sua conexão com internet';
                
                alert('❌ Erro no teste: ' + erro.message + sugestao);
            }
        }
        
        async function gerarRotina() {
            const prompt = document.getElementById('promptIA').value.trim();
            const erroEl = document.getElementById('erroMsg');
            const loading = document.getElementById('loading');
            const btnGerar = document.getElementById('btnGerar');
            
            // Esconder erro anterior
            erroEl.classList.remove('mostrar');
            
            if (!API_KEY) {
                alert('⚠️ Configure sua chave API primeiro!\n\nAbra a seção "Configurar API Gemini" acima.');
                return;
            }
            
            if (!prompt) {
                alert('Digite que tipo de rotina você quer!');
                return;
            }
            
            btnGerar.disabled = true;
            loading.classList.add('mostrar');
            
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `Crie uma rotina diária para: "${prompt}"
                                    
Retorne APENAS um array JSON com 4-6 atividades. Exemplo:
[
  {"nome": "Acordar e alongar", "hora": "07:00", "duracao": 30},
  {"nome": "Café da manhã", "hora": "07:30", "duracao": 30}
]

Regras:
- Use horários no formato HH:mm (24h)
- Duração entre 15 e 120 minutos
- Distribua ao longo do dia
- Seja realista e prático`
                                }]
                            }]
                        })
                    }
                );
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `Erro HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const texto = data.candidates[0].content.parts[0].text;
                
                // Extrair JSON
                const jsonMatch = texto.match(/\[[\s\S]*\]/);
                if (!jsonMatch) {
                    throw new Error('IA não retornou um JSON válido');
                }
                
                const sugestoes = JSON.parse(jsonMatch[0]);
                
                if (!sugestoes || sugestoes.length === 0) {
                    throw new Error('Nenhuma sugestão gerada');
                }
                
                // Mostrar sugestões
                const resumo = sugestoes.map(a => 
                    `• ${a.nome} às ${a.hora} (${a.duracao}min)`
                ).join('\n');
                
                if (confirm(`🤖 IA sugere ${sugestoes.length} atividades:\n\n${resumo}\n\nAdicionar à rotina?`)) {
                    sugestoes.forEach(atv => {
                        atividades.push({
                            id: Date.now() + Math.random(),
                            nome: atv.nome,
                            hora: atv.hora,
                            duracao: atv.duracao,
                            concluida: false
                        });
                    });
                    
                    atividades.sort((a, b) => a.hora.localeCompare(b.hora));
                    salvar();
                    renderizar();
                    alert(`✨ ${sugestoes.length} atividades adicionadas com sucesso!`);
                }
                
            } catch (erro) {
                console.error('Erro completo:', erro);
                erroEl.textContent = `❌ ${erro.message}`;
                erroEl.classList.add('mostrar');
            } finally {
                btnGerar.disabled = false;
                loading.classList.remove('mostrar');
            }
        }
        
        // ============ FUNÇÕES BÁSICAS ============
        
        function adicionar() {
            const nome = document.getElementById('nome').value.trim();
            const hora = document.getElementById('hora').value;
            const duracao = document.getElementById('duracao').value;
            
            if (!nome || !hora || !duracao) {
                alert('Preencha todos os campos!');
                return;
            }
            
            atividades.push({
                id: Date.now(),
                nome: nome,
                hora: hora,
                duracao: duracao,
                concluida: false
            });
            
            atividades.sort((a, b) => a.hora.localeCompare(b.hora));
            salvar();
            renderizar();
            
            document.getElementById('nome').value = '';
            document.getElementById('nome').focus();
        }
        
        function toggle(id) {
            const atividade = atividades.find(a => a.id === id);
            if (atividade) {
                atividade.concluida = !atividade.concluida;
                salvar();
                renderizar();
            }
        }
        
        function remover(id) {
            if (confirm('Remover esta atividade?')) {
                atividades = atividades.filter(a => a.id !== id);
                salvar();
                renderizar();
            }
        }
        
        function limparTudo() {
            if (atividades.length === 0) {
                alert('Nada para limpar!');
                return;
            }
            if (confirm('Apagar TODAS as atividades?')) {
                atividades = [];
                salvar();
                renderizar();
            }
        }
        
        function exportarDados() {
            if (atividades.length === 0) {
                alert('Nada para exportar!');
                return;
            }
            
            const dados = {
                data: new Date().toISOString(),
                atividades: atividades
            };
            
            const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rotina_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function salvar() {
            localStorage.setItem('rotina', JSON.stringify(atividades));
        }
        
        function renderizar() {
            const lista = document.getElementById('lista');
            
            if (atividades.length === 0) {
                lista.innerHTML = '<p class="vazio">✨ Nenhuma atividade ainda<br><small>Adicione manualmente ou peça ajuda da IA!</small></p>';
                return;
            }
            
            lista.innerHTML = atividades.map(a => `
                <div class="atividade ${a.concluida ? 'concluida' : ''}">
                    <div class="info">
                        <div class="nome">${a.nome}</div>
                        <div class="detalhes">🕐 ${a.hora} | ⏱️ ${a.duracao} min</div>
                    </div>
                    <div class="acoes">
                        <button class="btn-concluir" onclick="toggle(${a.id})">
                            ${a.concluida ? '↩️' : '✅'}
                        </button>
                        <button class="btn-remover" onclick="remover(${a.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Atalho: Enter no formulário
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.activeElement === document.getElementById('nome')) {
                e.preventDefault();
                adicionar();
            }
        });
        
        // Iniciar
        renderizar();
    </script>
</body>
</html>
