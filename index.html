<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Rotina com IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
            font-size: 24px;
        }
        
        /* Navegação de datas */
        .navegacao-data {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            background: #f0f2f5;
            padding: 10px;
            border-radius: 15px;
        }
        
        .btn-nav {
            background: #667eea;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        
        .btn-nav:hover {
            background: #764ba2;
            transform: scale(1.1);
        }
        
        .data-display {
            font-weight: bold;
            font-size: 16px;
            min-width: 200px;
            text-align: center;
            color: #333;
        }
        
        .btn-hoje {
            background: #27AE60;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        
        .btn-calendario {
            background: #F39C12;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        
        /* Calendário popup */
        .calendario-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        
        .calendario-popup.mostrar {
            display: block;
        }
        
        .calendario-popup input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin: 10px 0;
            width: 100%;
        }
        
        .calendario-popup button {
            margin: 5px;
            padding: 10px 20px;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        
        .overlay.mostrar {
            display: block;
        }
        
        /* Indicador de dia */
        .indicador-dia {
            text-align: center;
            margin-bottom: 15px;
            font-size: 13px;
            color: #666;
        }
        
        .dia-semana {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 15px;
            font-weight: bold;
        }
        
        .hoje { background: #d4edda; color: #155724; }
        .passado { background: #e2e3e5; color: #383d41; }
        .futuro { background: #d1ecf1; color: #0c5460; }
        
        /* API Config */
        .api-config {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #ffc107;
        }
        
        .api-config summary {
            cursor: pointer;
            font-weight: bold;
            color: #856404;
        }
        
        .api-config input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .api-config button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        /* IA Section */
        .ia-section {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .ia-section h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }
        
        .ia-input {
            display: flex;
            gap: 8px;
        }
        
        .ia-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .btn-ia {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .btn-ia:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* Formulário */
        .form-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        input, select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        input[type="text"] {
            flex: 1;
            min-width: 140px;
        }
        
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-adicionar { background: #4A90E2; }
        
        /* Estatísticas do dia */
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }
        
        .stat {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }
        
        .stat-valor {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }
        
        /* Lista de atividades */
        .atividade {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 5px solid #4A90E2;
            animation: slideIn 0.3s ease;
            transition: 0.3s;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .atividade.concluida {
            opacity: 0.6;
            text-decoration: line-through;
            border-left-color: #27AE60;
            background: #f0faf3;
        }
        
        .atividade.atrasada {
            border-left-color: #E74C3C;
            background: #fef5f5;
        }
        
        .info {
            flex: 1;
        }
        
        .nome {
            font-weight: bold;
            margin-bottom: 3px;
            font-size: 15px;
        }
        
        .detalhes {
            font-size: 12px;
            color: #666;
        }
        
        .status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-left: 5px;
        }
        
        .status-feito { background: #d4edda; color: #155724; }
        .status-pendente { background: #fff3cd; color: #856404; }
        .status-atrasado { background: #f8d7da; color: #721c24; }
        
        .acoes button {
            padding: 6px 10px;
            margin-left: 3px;
            font-size: 16px;
        }
        
        .btn-concluir { background: #27AE60; }
        .btn-remover { background: #E74C3C; }
        
        .vazio {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        /* Footer */
        .footer {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn-limpar { background: #E74C3C; font-size: 13px; }
        .btn-exportar { background: #F39C12; font-size: 13px; }
        .btn-historico { background: #8E44AD; font-size: 13px; }
        
        /* Histórico */
        .historico-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            max-width: 500px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .historico-popup.mostrar {
            display: block;
        }
        
        .historico-item {
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .historico-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .loading {
            text-align: center;
            padding: 10px;
            color: #667eea;
            display: none;
        }
        
        .loading.mostrar {
            display: block;
        }
        
        .erro {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        
        .erro.mostrar {
            display: block;
        }
        
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .ia-input { flex-direction: column; }
            .navegacao-data { flex-wrap: wrap; }
            .stats { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Minha Rotina</h1>
        
        <!-- Navegação de datas -->
        <div class="navegacao-data">
            <button class="btn-nav" onclick="mudarDia(-1)" title="Dia anterior">◀</button>
            <div class="data-display" id="dataDisplay"></div>
            <button class="btn-nav" onclick="mudarDia(1)" title="Próximo dia">▶</button>
            <button class="btn-hoje" onclick="irParaHoje()">Hoje</button>
            <button class="btn-calendario" onclick="abrirCalendario()">📆</button>
        </div>
        
        <div class="indicador-dia" id="indicadorDia"></div>
        
        <!-- Estatísticas -->
        <div class="stats">
            <div class="stat">
                <div class="stat-valor" id="totalAtividades">0</div>
                <div class="stat-label">Atividades</div>
            </div>
            <div class="stat">
                <div class="stat-valor" id="totalConcluidas">0</div>
                <div class="stat-label">Concluídas</div>
            </div>
            <div class="stat">
                <div class="stat-valor" id="totalTempo">0min</div>
                <div class="stat-label">Tempo Total</div>
            </div>
        </div>
        
        <!-- Config API -->
        <details class="api-config">
            <summary>⚙️ API Gemini</summary>
            <input type="password" id="apiKeyInput" placeholder="API Key (AIzaSy...)">
            <div style="margin-top: 8px;">
                <button onclick="salvarAPIKey()">💾 Salvar</button>
                <button onclick="testarAPI()" style="background: #17a2b8;">🔍 Testar</button>
            </div>
            <p id="statusAPI" style="font-size: 13px; margin-top: 5px;"></p>
        </details>
        
        <!-- IA -->
        <div class="ia-section">
            <h3>🤖 Assistente IA</h3>
            <div class="ia-input">
                <input type="text" id="promptIA" placeholder="Ex: rotina de sábado produtivo">
                <button class="btn-ia" onclick="gerarRotina()" id="btnGerar">✨ Gerar</button>
            </div>
            <div class="loading" id="loading">⏳ IA pensando...</div>
            <div class="erro" id="erroMsg"></div>
        </div>
        
        <!-- Formulário -->
        <div class="form-group">
            <input type="text" id="nome" placeholder="Atividade">
            <input type="time" id="hora">
            <input type="number" id="duracao" placeholder="Min" min="1" value="30" style="width: 65px;">
            <button class="btn-adicionar" onclick="adicionar()">➕</button>
        </div>
        
        <!-- Lista -->
        <div id="lista"></div>
        
        <!-- Footer -->
        <div class="footer">
            <button class="btn-historico" onclick="abrirHistorico()">📋 Histórico</button>
            <button class="btn-exportar" onclick="exportarDados()">📥 Exportar</button>
            <button class="btn-limpar" onclick="limparDia()">🗑️ Limpar dia</button>
        </div>
    </div>
    
    <!-- Overlay para popups -->
    <div class="overlay" id="overlay"></div>
    
    <!-- Popup Calendário -->
    <div class="calendario-popup" id="calendarioPopup">
        <h3>📆 Escolher data</h3>
        <input type="date" id="inputData">
        <div style="text-align: center; margin-top: 10px;">
            <button onclick="selecionarData()" style="background: #667eea;">✅ Ir para data</button>
            <button onclick="fecharCalendario()" style="background: #999;">Cancelar</button>
        </div>
    </div>
    
    <!-- Popup Histórico -->
    <div class="historico-popup" id="historicoPopup">
        <h3>📋 Histórico de Rotinas</h3>
        <div id="historicoLista"></div>
        <div style="text-align: center; margin-top: 15px;">
            <button onclick="fecharHistorico()" style="background: #999;">Fechar</button>
        </div>
    </div>

    <script>
        // ============ VARIÁVEIS GLOBAIS ============
        let API_KEY = localStorage.getItem('gemini_api_key') || '';
        let dataSelecionada = new Date(); // Data atual sendo visualizada
        let hoje = new Date(); // Hoje de verdade
        
        // ============ INICIALIZAÇÃO ============
        function init() {
            // Carregar chave API
            if (API_KEY) {
                document.getElementById('apiKeyInput').value = API_KEY;
                document.getElementById('statusAPI').textContent = '✅ Chave configurada';
                document.getElementById('statusAPI').style.color = 'green';
            }
            
            // Iniciar com hoje
            atualizarDataDisplay();
            carregarAtividades();
            
            // Atualizar a cada minuto (para indicadores de atraso)
            setInterval(() => {
                if (mesmoDia(dataSelecionada, new Date())) {
                    renderizarAtividades();
                }
            }, 60000);
        }
        
        // ============ GERENCIAMENTO DE DATAS ============
        function formatarData(data) {
            return data.toISOString().split('T')[0]; // YYYY-MM-DD
        }
        
        function mesmoDia(data1, data2) {
            return formatarData(data1) === formatarData(data2);
        }
        
        function mudarDia(dias) {
            dataSelecionada.setDate(dataSelecionada.getDate() + dias);
            atualizarDataDisplay();
            carregarAtividades();
        }
        
        function irParaHoje() {
            dataSelecionada = new Date();
            atualizarDataDisplay();
            carregarAtividades();
        }
        
        function abrirCalendario() {
            document.getElementById('calendarioPopup').classList.add('mostrar');
            document.getElementById('overlay').classList.add('mostrar');
            document.getElementById('inputData').value = formatarData(dataSelecionada);
        }
        
        function fecharCalendario() {
            document.getElementById('calendarioPopup').classList.remove('mostrar');
            document.getElementById('overlay').classList.remove('mostrar');
        }
        
        function selecionarData() {
            const novaData = document.getElementById('inputData').value;
            if (novaData) {
                dataSelecionada = new Date(novaData + 'T00:00:00');
                atualizarDataDisplay();
                carregarAtividades();
            }
            fecharCalendario();
        }
        
        function atualizarDataDisplay() {
            const opcoes = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            
            document.getElementById('dataDisplay').textContent = 
                dataSelecionada.toLocaleDateString('pt-BR', opcoes);
            
            // Indicador visual
            const indicador = document.getElementById('indicadorDia');
            const hojeDate = new Date();
            
            if (mesmoDia(dataSelecionada, hojeDate)) {
                indicador.innerHTML = '<span class="dia-semana hoje">📌 HOJE</span>';
            } else if (dataSelecionada < hojeDate) {
                indicador.innerHTML = '<span class="dia-semana passado">📅 Data passada</span>';
            } else {
                indicador.innerHTML = '<span class="dia-semana futuro">🔮 Data futura</span>';
            }
        }
        
        // ============ GERENCIAMENTO DE DADOS ============
        function getStorageKey() {
            return 'rotina_' + formatarData(dataSelecionada);
        }
        
        function carregarAtividades() {
            const dados = localStorage.getItem(getStorageKey());
            const atividades = dados ? JSON.parse(dados) : [];
            window.atividades = atividades; // Variável global para o dia atual
            renderizarAtividades();
        }
        
        function salvarAtividades() {
            localStorage.setItem(getStorageKey(), JSON.stringify(window.atividades));
        }
        
        // ============ OPERAÇÕES ============
        function adicionar() {
            const nome = document.getElementById('nome').value.trim();
            const hora = document.getElementById('hora').value;
            const duracao = document.getElementById('duracao').value;
            
            if (!nome || !hora || !duracao) {
                alert('Preencha todos os campos!');
                return;
            }
            
            window.atividades.push({
                id: Date.now() + Math.random(),
                nome: nome,
                hora: hora,
                duracao: parseInt(duracao),
                concluida: false,
                criadaEm: new Date().toISOString()
            });
            
            window.atividades.sort((a, b) => a.hora.localeCompare(b.hora));
            salvarAtividades();
            renderizarAtividades();
            
            document.getElementById('nome').value = '';
            document.getElementById('nome').focus();
        }
        
        function toggle(id) {
            const atividade = window.atividades.find(a => a.id === id);
            if (atividade) {
                atividade.concluida = !atividade.concluida;
                atividade.concluidaEm = atividade.concluida ? new Date().toISOString() : null;
                salvarAtividades();
                renderizarAtividades();
            }
        }
        
        function remover(id) {
            if (confirm('Remover esta atividade?')) {
                window.atividades = window.atividades.filter(a => a.id !== id);
                salvarAtividades();
                renderizarAtividades();
            }
        }
        
        function limparDia() {
            if (window.atividades.length === 0) {
                alert('Nada para limpar!');
                return;
            }
            if (confirm('Apagar TODAS as atividades desta data?')) {
                window.atividades = [];
                salvarAtividades();
                renderizarAtividades();
            }
        }
        
        // ============ RENDERIZAÇÃO ============
        function renderizarAtividades() {
            const lista = document.getElementById('lista');
            const agora = new Date();
            const horaAtual = `${String(agora.getHours()).padStart(2, '0')}:${String(agora.getMinutes()).padStart(2, '0')}`;
            
            // Atualizar estatísticas
            const total = window.atividades.length;
            const concluidas = window.atividades.filter(a => a.concluida).length;
            const tempoTotal = window.atividades.reduce((soma, a) => soma + a.duracao, 0);
            const horas = Math.floor(tempoTotal / 60);
            const minutos = tempoTotal % 60;
            const tempoFormatado = horas > 0 ? `${horas}h${minutos}min` : `${minutos}min`;
            
            document.getElementById('totalAtividades').textContent = total;
            document.getElementById('totalConcluidas').textContent = concluidas;
            document.getElementById('totalTempo').textContent = tempoFormatado;
            
            if (total === 0) {
                lista.innerHTML = `
                    <p class="vazio">
                        ✨ Nenhuma atividade para este dia<br>
                        <small>Adicione manualmente ou peça ajuda da IA!</small>
                    </p>`;
                return;
            }
            
            const ehHoje = mesmoDia(dataSelecionada, new Date());
            
            lista.innerHTML = window.atividades.map(a => {
                let classeExtra = '';
                let statusHTML = '';
                
                if (a.concluida) {
                    classeExtra = 'concluida';
                    statusHTML = '<span class="status status-feito">✅ Feito</span>';
                } else if (ehHoje && a.hora < horaAtual) {
                    classeExtra = 'atrasada';
                    statusHTML = '<span class="status status-atrasado">⚠️ Atrasada</span>';
                } else {
                    statusHTML = '<span class="status status-pendente">⏳ Pendente</span>';
                }
                
                return `
                    <div class="atividade ${classeExtra}">
                        <div class="info">
                            <div class="nome">${a.nome} ${statusHTML}</div>
                            <div class="detalhes">
                                🕐 ${a.hora} | ⏱️ ${a.duracao} min
                                ${a.concluida && a.concluidaEm ? ' | ✅ ' + new Date(a.concluidaEm).toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'}) : ''}
                            </div>
                        </div>
                        <div class="acoes">
                            <button class="btn-concluir" onclick="toggle(${a.id})">
                                ${a.concluida ? '↩️' : '✅'}
                            </button>
                            <button class="btn-remover" onclick="remover(${a.id})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ============ HISTÓRICO ============
        function abrirHistorico() {
            const historicoDiv = document.getElementById('historicoLista');
            const datas = [];
            
            // Buscar todas as datas que têm rotina salva
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('rotina_')) {
                    const dataStr = key.replace('rotina_', '');
                    const atividades = JSON.parse(localStorage.getItem(key) || '[]');
                    const concluidas = atividades.filter(a => a.concluida).length;
                    datas.push({
                        data: dataStr,
                        total: atividades.length,
                        concluidas: concluidas
                    });
                }
            }
            
            // Ordenar por data (mais recente primeiro)
            datas.sort((a, b) => b.data.localeCompare(a.data));
            
            if (datas.length === 0) {
                historicoDiv.innerHTML = '<p style="text-align:center; color:#999;">Nenhuma rotina salva ainda</p>';
            } else {
                historicoDiv.innerHTML = datas.map(d => {
                    const dataObj = new Date(d.data + 'T00:00:00');
                    const dataFormatada = dataObj.toLocaleDateString('pt-BR', {
                        weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric'
                    });
                    const percentual = d.total > 0 ? Math.round((d.concluidas / d.total) * 100) : 0;
                    const barraCor = percentual === 100 ? '#27AE60' : percentual >= 50 ? '#F39C12' : '#E74C3C';
                    
                    return `
                        <div class="historico-item" onclick="irParaData('${d.data}')">
                            <div>
                                <strong>${dataFormatada}</strong><br>
                                <small>${d.total} atividades</small>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-weight: bold; color: ${barraCor};">
                                    ${d.concluidas}/${d.total}
                                </div>
                                <small>${percentual}% concluído</small>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            document.getElementById('historicoPopup').classList.add('mostrar');
            document.getElementById('overlay').classList.add('mostrar');
        }

            document.getElementById('historicoPopup').classList.remove('mostrar');
            document.getElementById('overlay').classList.remove('mostrar');
        }

        function exportarDados() {

                alert('Nada para exportar nesta data!');
                return;
            }
            
            const dados = {
                data: formatarData(dataSelecionada),
                atividades: window.atividades,
                exportadoEm: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rotina_${formatarData(dataSelecionada)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function testarAPI() {
            const key = document.getElementById('apiKeyInput').value || API_KEY;
            if (!key) {

            }
            
            const statusEl = document.getElementById('statusAPI');

            try {

                        body: JSON.stringify({

                        })
                    }
                );
                
                if (response.ok) {
                    statusEl.textContent = '✅ API funcionando!';
                    statusEl.style.color = 'green';
                    alert('✅ API funcionando perfeitamente!');
                } else {
                    throw new Error('Erro na API');
                }
            } catch (erro) {

                statusEl.style.color = 'red';
                alert('❌ Erro: ' + erro.message);

        async function gerarRotina() {
            const prompt = document.getElementById('promptIA').value.trim();
            
            if (!API_KEY) {
                alert('Configure a chave API primeiro!');
                return;
            }
            
            if (!prompt) {
                alert('Digite que tipo de rotina você quer!');
                return;
            }
            
            const btnGerar = document.getElementById('btnGerar');
            const loading = document.getElementById('loading');
            const erroEl = document.getElementById('erroMsg');
            
            btnGerar.disabled = true;
            loading.classList.add('mostrar');
            erroEl.classList.remove('mostrar');
            
            try {
                const dataFormatada = dataSelecionada.toLocaleDateString('pt-BR', { weekday: 'long' });
                
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `Crie uma rotina para ${dataFormatada} com o tema: "${prompt}"
                                    
Retorne APENAS um JSON com 4-6 atividades. Formato:
[
  {"nome": "Atividade", "hora": "HH:mm", "duracao": minutos}
]

Regras:
- Horários em formato 24h
- Duração entre 15 e 120 minutos
- Distribua ao longo do dia
- Seja realista e prático
- Considere que é ${dataFormatada}`
                                }]
                            }]
                        })
                    }
                );
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'Erro na API');
                }
                
                const data = await response.json();
                const texto = data.candidates[0].content.parts[0].text;
                const jsonMatch = texto.match(/\[[\s\S]*\]/);
                
                if (!jsonMatch) throw new Error('Resposta inválida da IA');
                
                const sugestoes = JSON.parse(jsonMatch[0]);
                
                const resumo = sugestoes.map(a => 
                    `• ${a.nome} às ${a.hora} (${a.duracao}min)`
                ).join('\n');
                
                if (confirm(`🤖 IA sugere para ${dataFormatada}:\n\n${resumo}\n\nAdicionar à rotina?`)) {
                    sugestoes.forEach(atv => {
                        window.atividades.push({
                            id: Date.now() + Math.random(),
                            nome: atv.nome,
                            hora: atv.hora,
                            duracao: atv.duracao,
                            concluida: false,
                            criadaEm: new Date().toISOString(),
                            criadaPorIA: true
                        });
                    });
                    
                    window.atividades.sort((a, b) => a.hora.localeCompare(b.hora));
                    salvarAtividades();
                    renderizarAtividades();
                    alert(`✨ ${sugestoes.length} atividades adicionadas!`);
                }
                
            } catch (erro) {
                erroEl.textContent = `❌ ${erro.message}`;
                erroEl.classList.add('mostrar');
            } finally {
                btnGerar.disabled = false;
                loading.classList.remove('mostrar');
            }
        }
